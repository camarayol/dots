[app]
overall = { bg = "#282c34" }

[mgr]
cwd            = { fg = "#61afef", bold = true }
find_keyword   = { fg = "#e5c07b", bold = true }
find_position  = { fg = "#5c6370" }
symlink_target = { fg = "#56b6c2" }
marker_copied  = { fg = "#98c379", bold = true }
marker_cut     = { fg = "#e06c75", bold = true }
marker_marked  = { fg = "#c678dd", bold = true }
marker_selected = { fg = "#61afef", bold = true }
count_copied   = { fg = "#98c379", bold = true }
count_cut      = { fg = "#e06c75", bold = true }
count_selected = { fg = "#61afef", bold = true }
border_symbol  = "│"
border_style   = { fg = "#3e4452" }

[tabs]
active   = { fg = "#282c34", bg = "#61afef", bold = true }
inactive = { fg = "#abb2bf", bg = "#3e4452" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#282c34", bg = "#61afef", bold = true }
normal_alt  = { fg = "#abb2bf", bg = "#3e4452" }
select_main = { fg = "#282c34", bg = "#98c379", bold = true }
select_alt  = { fg = "#abb2bf", bg = "#3e4452" }
unset_main  = { fg = "#282c34", bg = "#e5c07b", bold = true }
unset_alt   = { fg = "#abb2bf", bg = "#3e4452" }

[status]
overall         = { fg = "#abb2bf", bg = "#21252b" }
sep_left        = { open = "", close = "" }
sep_right       = { open = "", close = "" }
perm_type       = { fg = "#61afef" }
perm_read       = { fg = "#98c379" }
perm_write      = { fg = "#e5c07b" }
perm_exec       = { fg = "#e06c75" }
perm_sep        = { fg = "#5c6370" }
progress_label  = { fg = "#282c34", bg = "#61afef", bold = true }
progress_normal = { fg = "#282c34", bg = "#3e4452" }
progress_error  = { fg = "#282c34", bg = "#e06c75", bold = true }

[which]
mask            = { bg = "#21252b" }
cand            = { fg = "#61afef", bold = true }
rest            = { fg = "#abb2bf" }
desc            = { fg = "#5c6370" }
separator       = "  "
separator_style = { fg = "#3e4452" }

[confirm]
border  = { fg = "#3e4452" }
title   = { fg = "#61afef", bold = true }
body    = { fg = "#abb2bf" }
list    = { fg = "#dcdfe4" }
btn_yes = { fg = "#282c34", bg = "#98c379", bold = true }
btn_no  = { fg = "#282c34", bg = "#e06c75", bold = true }

[spot]
border   = { fg = "#3e4452" }
title    = { fg = "#61afef", bold = true }
tbl_col  = { fg = "#e5c07b" }
tbl_cell = { fg = "#abb2bf" }

[pick]
border   = { fg = "#3e4452" }
active   = { fg = "#282c34", bg = "#61afef", bold = true }
inactive = { fg = "#abb2bf" }

[input]
border   = { fg = "#3e4452" }
title    = { fg = "#61afef", bold = true }
value    = { fg = "#dcdfe4" }
selected = { reversed = true }

[cmp]
border   = { fg = "#3e4452" }
active   = { fg = "#282c34", bg = "#61afef", bold = true }
inactive = { fg = "#abb2bf" }

[tasks]
border  = { fg = "#3e4452" }
title   = { fg = "#61afef", bold = true }
hovered = { fg = "#dcdfe4", bg = "#3e4452" }

[help]
on      = { fg = "#61afef", bold = true }
run     = { fg = "#98c379" }
desc    = { fg = "#abb2bf" }
hovered = { bg = "#3e4452" }
footer  = { fg = "#5c6370", bg = "#21252b" }

[notify]
title_info  = { fg = "#61afef" }
title_warn  = { fg = "#e5c07b" }
title_error = { fg = "#e06c75" }

[filetype]
rules = [
  { url = "*/", fg = "#61afef" },
  { url = "*", is = "exec", fg = "#98c379" },
  { url = "*", is = "orphan", fg = "#e06c75" },
  { mime = "image/*", fg = "#e5c07b" },
  { mime = "{audio,video}/*", fg = "#c678dd" },
  { url = "*", fg = "#dcdfe4" },
]
